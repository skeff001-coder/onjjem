kind = "video"
previewPath = "/byte2eat-ad/"
title = "Byte 2 Eat — Ad Video"
version = "1.0.0"
id = "artifacts/byte2eat-ad"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/byte2eat-ad/" ]
localPort = 25664

[services.development]
run = "pnpm --filter @workspace/byte2eat-ad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/byte2eat-ad", "run", "build" ]
publicDir = "artifacts/byte2eat-ad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25664"
BASE_PATH = "/byte2eat-ad/"
